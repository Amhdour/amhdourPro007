<svg width="1400" height="840" viewBox="0 0 1400 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Secure Support Agent Starter Kit architecture flow</title>
  <desc id="desc">Dark-themed architecture diagram showing Agent Request flowing through Policy Engine to Retrieval, Model, Tool Router and Response, with Telemetry and Evidence tracking as a side layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="1" stop-color="#1B2234"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2A44"/>
      <stop offset="1" stop-color="#131C31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#36BFFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0EA5E9" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#67E8F9"/>
    </marker>
  </defs>

  <rect width="1400" height="840" rx="28" fill="url(#bg)"/>
  <text x="700" y="72" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">Secure Support Agent Starter Kit</text>
  <text x="700" y="108" text-anchor="middle" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18">Policy-first orchestration • bounded access • auditable evidence</text>

  <g filter="url(#shadow)">
    <rect x="90" y="270" width="180" height="110" rx="16" fill="url(#card)" stroke="#38BDF8" stroke-opacity="0.5"/>
    <text x="180" y="318" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Agent</text>
    <text x="180" y="345" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Request</text>

    <rect x="330" y="270" width="220" height="110" rx="16" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.6"/>
    <text x="440" y="318" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Policy Engine</text>
    <text x="440" y="345" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">deny-by-default</text>

    <rect x="620" y="145" width="190" height="100" rx="16" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="715" y="188" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">Retrieval</text>
    <text x="715" y="212" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">bounded context</text>

    <rect x="620" y="305" width="190" height="100" rx="16" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="715" y="348" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">Model</text>
    <text x="715" y="372" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">guardrailed outputs</text>

    <rect x="880" y="305" width="210" height="100" rx="16" fill="url(#card)" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="985" y="348" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">Tool Router</text>
    <text x="985" y="372" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">authorized actions only</text>

    <rect x="1150" y="305" width="160" height="100" rx="16" fill="url(#card)" stroke="#38BDF8" stroke-opacity="0.6"/>
    <text x="1230" y="348" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">Response</text>
    <text x="1230" y="372" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">validated</text>
  </g>

  <path d="M270 325H330" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M550 325H620" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M810 355H880" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1090 355H1150" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M715 270V245" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>

  <g>
    <rect x="250" y="510" width="900" height="190" rx="20" fill="#0F172A" fill-opacity="0.65" stroke="url(#accent)" stroke-opacity="0.6"/>
    <text x="700" y="558" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Telemetry &amp; Evidence Layer</text>
    <text x="700" y="592" text-anchor="middle" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="17">Replay-friendly traces • scenario-driven security evals • launch-gate readiness outputs</text>
    <text x="700" y="628" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">artifacts/logs/evals/ • launch-gate engine output • audit artifacts</text>
  </g>
</svg>
